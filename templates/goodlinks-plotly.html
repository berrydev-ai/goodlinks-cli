<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
{{ $data := .Page.Resources.GetMatch "goodlinks-data.json" }}
<div id="goodlinks-plotly-{{ .Ordinal }}"></div>
<script>
fetch("{{ $data.RelPermalink }}").then(response => response.json()).then(data => {
  const traces = Object.entries(data.tag_series).map(([name, months]) => ({name, x:Object.keys(months), y:Object.values(months), stackgroup:"one", type:"scatter"}));
  Plotly.newPlot("goodlinks-plotly-{{ .Ordinal }}", traces, {margin:{t:10}});
});
</script>
